services:
  - type: web
    name: smart-campus-web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: smart-campus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: smart-campus-db
    databaseName: smartcampusdb
    user: smartcampususer
    plan: free
