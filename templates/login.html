{% extends "base.html" %}

{% block title %}Login - Smart Campus{% endblock %}

{% block auth_content %}
<div class="card auth-card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
    <div class="logo" style="text-align: center; margin-bottom: 2rem; font-size: 1.5rem;">SMART CAMPUS</div>
    <h2 style="text-align: center; margin-bottom: 2rem; font-weight: 600;">Welcome Back</h2>

    <form action="/login" method="POST">
        <div class="mb-4">
            <label class="form-label" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Username</label>
            <input type="text" name="username" class="form-control" required placeholder="Enter your username">
        </div>
        <div class="mb-4">
            <label class="form-label" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Password</label>
            <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
    </form>
</div>
{% endblock %}
